{% extends 'base.html' %}

{% block content %}
<div class="section-header">
    <h2>Delete Note</h2>
</div>
<p class="muted">This action cannot be undone.</p>

<div style="border-radius:14px; border:1px solid #1f2937; padding:12px 14px; margin:10px 0; background:#ffffff;">
    <h3 style="margin:0 0 6px; font-size:1rem;">{{ note.title }}</h3>
    <p style="margin:0; font-size:0.9rem;">{{ note.content|linebreaks }}</p>
</div>

<form method="post" style="margin-top:10px;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'note_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
